version: "3.9"

services:

  db:
    image: pgvector/pgvector:pg16
    container_name: factory_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: factory_copilot

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  backend:
    build:
      context: ./backend

    container_name: factory_backend

    env_file:
      - ./backend/.env

    depends_on:
      - db

    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    depends_on:
      - backend

    container_name: factory_frontend

    ports:
      - "8080:80"

    restart: unless-stopped

volumes:
  postgres_data: