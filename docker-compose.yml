# factory-copilot/docker-compose.yml
services:
  db:
    image: postgres:15-alpine
    container_name: copilot_postgres
    environment:
      POSTGRES_USER: factory_user
      POSTGRES_PASSWORD: hackathon_password
      POSTGRES_DB: factory_db
    ports:
      - "5432:5432"
    volumes:
      # Persist Postgres data on the host VM
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: copilot_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # Tell FastAPI how to connect to the new db container
      - DATABASE_URL=postgresql+asyncpg://factory_user:hackathon_password@db:5432/factory_db
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: copilot_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

# Define the named volume for Postgres
volumes:
  pgdata: